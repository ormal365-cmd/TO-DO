name: Make EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 내 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 깃허브 컴퓨터에 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. 변환 마법 도구(PyInstaller) 설치
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: 4. EXE 파일로 변환 시작!
      run: |
        pyinstaller --onefile --noconsole todo_app.py

    - name: 5. 완성된 EXE 파일 업로드 (다운로드용)
      uses: actions/upload-artifact@v4
      with:
        name: 투두리스트_프로그램
        path: dist/todo_app.exe
