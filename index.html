<!DOCTYPE html>
<html lang="ko" data-theme="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐰 큐트 투두 & 비밀수첩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            /* 기본 (블루) - 사진과 동일한 스포이드 색상 */
            --grad-start: #e1ebf9;
            --grad-end: #f4f8ff;
            --primary: #9bbef2;
            --text-main: #6a95d6;
        }
        [data-theme="mint"] {
            /* 메론소다 (민트) */
            --grad-start: #e0f4e8;
            --grad-end: #f2fbf5;
            --primary: #94d4b2;
            --text-main: #69af8a;
        }
        [data-theme="pink"] {
            /* 딸기우유 (핑크) */
            --grad-start: #ffebef;
            --grad-end: #fff5f7;
            --primary: #ffadbc;
            --text-main: #e07489;
        }
        [data-theme="purple"] {
            /* 라벤더 (퍼플) */
            --grad-start: #f1edfa;
            --grad-end: #f7f5ff;
            --primary: #bcaaf2;
            --text-main: #937dc9;
        }

        body { 
            font-family: 'Noto Sans KR', 'Nunito', sans-serif; 
            /* 화면 절반이 하얀색이 되는 오류 수정! 스르륵 끝까지 연한 색으로 이어집니다 */
            background: linear-gradient(180deg, var(--grad-start) 0%, var(--grad-end) 100%);
            background-attachment: fixed; 
            background-size: cover;
            color: #333;
        }
        
        /* 반투명한 유리(글래스모피즘) 효과 */
        .glass { 
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }
        
        .theme-text { color: var(--text-main); }
        .theme-bg { background-color: var(--primary); color: white; }
        .theme-border { border-color: var(--primary); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.8); border-radius: 10px; }
        
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 테마 스와치 (버튼 크기 귀엽게 줄임!) */
        .color-swatch {
            width: 100%;
            height: 60px; /* 기존보다 훨씬 작고 귀엽게 */
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }
        .color-swatch:hover { transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md rounded-[2.5rem] flex flex-col h-[750px] max-h-[90vh] pop-in relative overflow-hidden">
        
        <!-- 상단 헤더 & 로그인/로그아웃 버튼 -->
        <div class="flex justify-between items-center p-6 pb-2">
            <h1 class="text-2xl font-black theme-text tracking-tight">🐰 My Todo</h1>
            <button id="loginBtn" onclick="toggleLogin()" class="px-4 py-2 bg-white/80 rounded-full font-bold text-sm shadow-sm hover:bg-white transition-colors theme-text">
                구글 연동
            </button>
        </div>

        <div class="flex px-6 py-2 gap-3 relative z-10">
            <button id="tab-todo-btn" onclick="switchTab('todo')" class="flex-1 py-3 rounded-2xl font-bold bg-white shadow-sm border-2 theme-border theme-text transition-all">할 일</button>
            <button id="tab-acc-btn" onclick="switchTab('account')" class="flex-1 py-3 rounded-2xl font-bold bg-white/40 text-gray-400 border-2 border-transparent transition-all">비밀 수첩</button>
        </div>

        <!-- 할 일 탭 내용 -->
        <div id="tab-todo" class="flex-1 p-6 overflow-y-auto space-y-4">
            <div class="glass-card p-4 rounded-2xl space-y-3">
                <input type="text" id="taskInput" placeholder="✨ 무엇을 할까요?" class="w-full bg-white/80 p-3 rounded-xl focus:outline-none focus:ring-2 theme-border font-medium text-gray-700 placeholder-gray-400">
                <input type="datetime-local" id="timeInput" class="w-full bg-white/80 p-3 rounded-xl focus:outline-none focus:ring-2 theme-border font-medium text-gray-600">
                <button onclick="addTask()" class="w-full py-3 rounded-xl font-bold theme-bg shadow-md hover:opacity-90 transition-opacity">💖 추가하기</button>
            </div>
            
            <div class="flex items-center justify-between pt-2">
                <span class="font-bold theme-text">🌟 나의 할 일 목록</span>
            </div>
            <div id="taskList" class="space-y-3 pb-20">
                <p class="text-center text-gray-400 text-sm mt-10">로그인하고 할 일을 추가해 보세요! 🐰</p>
            </div>
        </div>

        <!-- 비밀 수첩 탭 내용 -->
        <div id="tab-account" class="flex-1 p-6 overflow-y-auto space-y-4 hidden">
            <div class="glass-card p-4 rounded-2xl space-y-3">
                <input type="text" id="siteInput" placeholder="🌐 사이트 이름" class="w-full bg-white/80 p-3 rounded-xl focus:outline-none focus:ring-2 theme-border font-medium text-gray-700">
                <input type="text" id="idInput" placeholder="👤 아이디" class="w-full bg-white/80 p-3 rounded-xl focus:outline-none focus:ring-2 theme-border font-medium text-gray-700">
                <input type="password" id="pwInput" placeholder="🔑 비밀번호" class="w-full bg-white/80 p-3 rounded-xl focus:outline-none focus:ring-2 theme-border font-medium text-gray-700">
                <button id="accSubmitBtn" onclick="addAccount()" class="w-full py-3 rounded-xl font-bold theme-bg shadow-md hover:opacity-90 transition-opacity">🔒 비밀 저장하기</button>
            </div>
            
            <div id="accountList" class="space-y-3 pb-20 mt-4"></div>
        </div>

        <!-- 꾸미기 플로팅 버튼 -->
        <button onclick="document.getElementById('themeModal').classList.remove('hidden')" class="absolute bottom-6 right-6 w-14 h-14 bg-white/90 rounded-full shadow-lg flex items-center justify-center text-2xl hover:scale-110 transition-transform border border-white">
            🎨
        </button>
    </div>

    <!-- 테마 선택 모달 (4가지 컬러 - 사진과 동일한 스포이드 색상!) -->
    <div id="themeModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity p-4">
        <div class="glass-card p-6 rounded-[2rem] w-full max-w-sm shadow-2xl space-y-4 pop-in">
            <h2 class="text-xl font-black theme-text text-center mb-2">🎨 테마 변경</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <!-- 기본 (Blue) -->
                <button onclick="setTheme('blue')" class="color-swatch" style="background: linear-gradient(180deg, #e1ebf9 0%, #f4f8ff 100%);"></button>
                <!-- 메론소다 (Mint) -->
                <button onclick="setTheme('mint')" class="color-swatch" style="background: linear-gradient(180deg, #e0f4e8 0%, #f2fbf5 100%);"></button>
                <!-- 딸기우유 (Pink) -->
                <button onclick="setTheme('pink')" class="color-swatch" style="background: linear-gradient(180deg, #ffebef 0%, #fff5f7 100%);"></button>
                <!-- 라벤더 (Purple) -->
                <button onclick="setTheme('purple')" class="color-swatch" style="background: linear-gradient(180deg, #f1edfa 0%, #f7f5ff 100%);"></button>
            </div>

            <button onclick="document.getElementById('themeModal').classList.add('hidden')" class="w-full py-3 mt-2 bg-white hover:bg-gray-50 transition-colors rounded-xl font-bold text-gray-500 border border-gray-200 shadow-sm">
                닫기
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // 🚨 여기에 발급받으신 진짜 API KEY 코드를 다시 덮어써주세요! 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyAmno-w_qs5wlTM58y7x_zCQU2hjnlHdkM",
            authDomain: "cute-todo-app-65054.firebaseapp.com",
            projectId: "cute-todo-app-65054",
            storageBucket: "cute-todo-app-65054.firebasestorage.app",
            messagingSenderId: "323001649797",
            appId: "1:323001649797:web:aa34d1883c313cf10f37ec"
        };

        let app, auth, db;
        try {
            app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch(e) {
            console.error("Firebase 초기화 에러:", e);
        }

        let currentUser = null;

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeModal').classList.add('hidden');
            localStorage.setItem('cuteTodoTheme', theme);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('cuteTodoTheme');
            if(savedTheme) setTheme(savedTheme);
            
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('timeInput').value = now.toISOString().slice(0,16);
        };

        function switchTab(tab) {
            const todoTab = document.getElementById('tab-todo');
            const accTab = document.getElementById('tab-account');
            const todoBtn = document.getElementById('tab-todo-btn');
            const accBtn = document.getElementById('tab-acc-btn');

            if (tab === 'todo') {
                todoTab.classList.remove('hidden');
                accTab.classList.add('hidden');
                
                todoBtn.className = "flex-1 py-3 rounded-2xl font-bold bg-white shadow-sm border-2 theme-border theme-text transition-all";
                accBtn.className = "flex-1 py-3 rounded-2xl font-bold bg-white/40 text-gray-400 border-2 border-transparent transition-all hover:bg-white/60";
            } else {
                todoTab.classList.add('hidden');
                accTab.classList.remove('hidden');
                
                accBtn.className = "flex-1 py-3 rounded-2xl font-bold bg-white shadow-sm border-2 theme-border theme-text transition-all";
                todoBtn.className = "flex-1 py-3 rounded-2xl font-bold bg-white/40 text-gray-400 border-2 border-transparent transition-all hover:bg-white/60";
            }
        }

        // 🔐 로그아웃 기능 포함!
        function toggleLogin() {
            if (currentUser) {
                if(confirm("로그아웃 하시겠습니까?")) {
                    auth.signOut().then(() => {
                        alert("로그아웃 되었습니다!");
                    }).catch((error) => {
                        alert("로그아웃 에러: " + error.message);
                    });
                }
            } else {
                if(firebaseConfig.apiKey === "여기에_복사한_API_KEY_붙여넣기") {
                    alert("앗! 코드 안쪽에 파이어베이스 진짜 '열쇠(Config)'를 덮어써주셔야 해요!");
                    return;
                }
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch((error) => {
                    alert(`로그인 에러: ${error.message}`);
                });
            }
        }

        if(auth) {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('loginBtn').innerText = user.displayName + "님 🐰 (로그아웃)";
                    document.getElementById('loginBtn').classList.add('bg-green-100', 'text-green-700');
                    loadTasks();
                    loadAccounts();
                } else {
                    currentUser = null;
                    document.getElementById('loginBtn').innerText = "구글 연동";
                    document.getElementById('loginBtn').classList.remove('bg-green-100', 'text-green-700');
                    document.getElementById('taskList').innerHTML = '<p class="text-center text-gray-400 mt-10">로그인하고 할 일을 추가해 보세요! 🐰</p>';
                    document.getElementById('accountList').innerHTML = '';
                }
            });
        }

        async function addTask() {
            if (!currentUser) return alert("먼저 우측 상단에서 구글 연동을 해주세요! 🥺");
            
            const taskInput = document.getElementById('taskInput').value.trim();
            const timeInput = document.getElementById('timeInput').value;
            
            if (!taskInput) return alert("할 일을 입력해 주세요! ✨");

            try {
                await db.collection('users').doc(currentUser.uid).collection('tasks').add({
                    task: taskInput,
                    due: timeInput,
                    completed: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('taskInput').value = '';
            } catch (e) {
                alert("저장 실패! Firestore 권한 규칙이 true로 되어있는지 확인해주세요.\n" + e.message);
            }
        }

        // 🚨 정렬 조건(orderBy) 제거! 이제 숨은 데이터까지 무조건 다 가져옵니다!
        function loadTasks() {
            if (!currentUser) return;
            
            db.collection('users').doc(currentUser.uid).collection('tasks')
              .onSnapshot((snapshot) => {
                  const list = document.getElementById('taskList');
                  list.innerHTML = '';
                  
                  if(snapshot.empty) {
                      list.innerHTML = '<p class="text-center text-gray-400 mt-10">할 일이 없어요! 푹 쉬세요! 🏖️</p>';
                      return;
                  }

                  snapshot.forEach((doc) => {
                      const data = doc.data();
                      const div = document.createElement('div');
                      div.className = "glass-card p-4 rounded-xl flex items-center justify-between";
                      
                      let timeStr = "시간 없음";
                      if(data.due) {
                          const dateObj = new Date(data.due);
                          if(!isNaN(dateObj)) {
                              timeStr = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${String(dateObj.getHours()).padStart(2,'0')}:${String(dateObj.getMinutes()).padStart(2,'0')}`;
                          }
                      }

                      div.innerHTML = `
                          <div class="flex items-center gap-3 overflow-hidden">
                              <input type="checkbox" ${data.completed ? 'checked' : ''} onchange="toggleTask('${doc.id}', ${data.completed})" class="w-5 h-5 rounded border-gray-300 text-pink-500 focus:ring-pink-500">
                              <div class="flex flex-col">
                                  <span class="text-xs text-gray-400 font-bold">${timeStr}</span>
                                  <span class="font-bold ${data.completed ? 'line-through text-gray-400' : 'text-gray-700'} truncate">${data.task}</span>
                              </div>
                          </div>
                          <button onclick="deleteTask('${doc.id}')" class="text-red-400 hover:text-red-600 font-bold p-2 text-xl">✖</button>
                      `;
                      list.appendChild(div);
                  });
              });
        }

        function toggleTask(id, currentStatus) {
            db.collection('users').doc(currentUser.uid).collection('tasks').doc(id).update({
                completed: !currentStatus
            });
        }

        function deleteTask(id) {
            if(confirm("정말 삭제할까요?")) {
                db.collection('users').doc(currentUser.uid).collection('tasks').doc(id).delete();
            }
        }

        let editingAccountId = null; // 수정 중인 계정의 ID를 기억하는 변수

        async function addAccount() {
            if (!currentUser) return alert("먼저 구글 연동을 해주세요! 🥺");
            
            const site = document.getElementById('siteInput').value.trim();
            const uid = document.getElementById('idInput').value.trim();
            const pw = document.getElementById('pwInput').value.trim();
            const btn = document.getElementById('accSubmitBtn');
            
            if (!site || !uid || !pw) return alert("모든 칸을 채워주세요! 📝");

            try {
                if (editingAccountId) {
                    // 기존 데이터 수정(업데이트)
                    await db.collection('users').doc(currentUser.uid).collection('accounts').doc(editingAccountId).update({
                        site: site,
                        id: uid,
                        pw: pw
                    });
                    editingAccountId = null;
                    btn.innerText = "✅ 수정 완료!";
                    setTimeout(() => { btn.innerText = "🔒 비밀 저장하기"; }, 1500); // 1.5초 뒤 원래 버튼으로 복귀
                } else {
                    // 새 데이터 추가
                    await db.collection('users').doc(currentUser.uid).collection('accounts').add({
                        site: site,
                        id: uid,
                        pw: pw,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                document.getElementById('siteInput').value = '';
                document.getElementById('idInput').value = '';
                document.getElementById('pwInput').value = '';
            } catch(e) {
                alert("저장 실패!\n" + e.message);
            }
        }

        // 🚨 비밀수첩 정렬 조건(orderBy) 제거! 숨은 비밀번호 강제 소환!
        function loadAccounts() {
            if (!currentUser) return;
            
            db.collection('users').doc(currentUser.uid).collection('accounts')
              .onSnapshot((snapshot) => {
                  const list = document.getElementById('accountList');
                  list.innerHTML = '';
                  
                  if(snapshot.empty) {
                      list.innerHTML = '<p class="text-center text-gray-400 mt-10">저장된 비밀번호가 없습니다. 🤫</p>';
                      return;
                  }

                  snapshot.forEach((doc) => {
                      const data = doc.data();
                      const div = document.createElement('div');
                      div.className = "glass-card p-4 rounded-xl flex flex-col gap-2";
                      
                      div.innerHTML = `
                          <div class="flex justify-between items-center border-b border-gray-200/50 pb-2 mb-1">
                              <span class="font-bold theme-text text-lg">${data.site}</span>
                              <div class="flex gap-1">
                                  <button onclick="editAccount('${doc.id}', '${data.site.replace(/'/g, "\\'")}', '${data.id.replace(/'/g, "\\'")}', '${data.pw.replace(/'/g, "\\'")}')" class="text-blue-400 hover:text-blue-600 text-sm font-bold bg-blue-50 px-2 py-1 rounded-lg">수정</button>
                                  <button onclick="deleteAccount('${doc.id}')" class="text-red-400 hover:text-red-600 text-sm font-bold bg-red-50 px-2 py-1 rounded-lg">삭제</button>
                              </div>
                          </div>
                          <div class="flex justify-between items-center">
                              <span class="text-gray-600 font-medium">ID: ${data.id}</span>
                              <button onclick="copyText('${data.id}')" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-gray-600 font-bold">복사</button>
                          </div>
                          <div class="flex justify-between items-center">
                              <span class="text-gray-600 font-medium password-field" data-pw="${data.pw}">PW: ********</span>
                              <div class="flex gap-1">
                                  <button onclick="togglePW(this)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-gray-600 font-bold">확인</button>
                                  <button onclick="copyText('${data.pw}')" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded text-gray-600 font-bold">복사</button>
                              </div>
                          </div>
                      `;
                      list.appendChild(div);
                  });
              });
        }

        function deleteAccount(id) {
            if(confirm("이 비밀번호를 삭제할까요?")) {
                db.collection('users').doc(currentUser.uid).collection('accounts').doc(id).delete();
            }
        }

        // 수정 버튼을 눌렀을 때 실행되는 함수
        function editAccount(id, site, uid, pw) {
            editingAccountId = id; // 수정할 ID 기억하기
            
            // 위쪽 입력창에 기존 데이터 채워넣기
            document.getElementById('siteInput').value = site;
            document.getElementById('idInput').value = uid;
            document.getElementById('pwInput').value = pw;
            
            // 버튼 모양과 글씨 바꾸기
            document.getElementById('accSubmitBtn').innerText = "💾 수정 완료하기";
            
            // 입력창이 있는 맨 위로 부드럽게 스크롤 올려주기
            document.getElementById('tab-account').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function togglePW(btn) {
            const pwField = btn.parentElement.parentElement.querySelector('.password-field');
            const realPw = pwField.getAttribute('data-pw');
            if (pwField.innerText === "PW: ********") {
                pwField.innerText = "PW: " + realPw;
                btn.innerText = "숨김";
            } else {
                pwField.innerText = "PW: ********";
                btn.innerText = "확인";
            }
        }

        function copyText(text) {
            const temp = document.createElement("textarea");
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
            alert("복사 완료! 📋");
        }
    </script>
</body>
</html>
